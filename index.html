<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Budget Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Budget Tracker</h1>
      <p class="subtitle">Track income, expenses, and savings goals</p>
    </header>

    <section class="summary-grid">
      <div class="summary-card income">
        <span class="summary-label">Total Income</span>
        <span class="summary-value" id="total-income">$0.00</span>
      </div>
      <div class="summary-card expenses">
        <span class="summary-label">Total Expenses</span>
        <span class="summary-value" id="total-expenses">$0.00</span>
      </div>
      <div class="summary-card balance">
        <span class="summary-label">Balance</span>
        <span class="summary-value" id="balance">$0.00</span>
      </div>
      <div class="summary-card savings">
        <span class="summary-label">Savings Rate</span>
        <span class="summary-value" id="savings-rate">0%</span>
      </div>
    </section>

    <section class="main-grid">
      <div class="card">
        <h2>Add Transaction</h2>
        <div class="form-group">
          <label for="description">Description</label>
          <input type="text" id="description" placeholder="e.g. Rent, Salary, Groceries" />
        </div>
        <div class="form-group">
          <label for="amount">Amount ($)</label>
          <input type="number" id="amount" placeholder="0.00" min="0" step="0.01" />
        </div>
        <div class="form-group">
          <label for="category">Category</label>
          <select id="category">
            <option value="income">Income</option>
            <option value="housing">Housing</option>
            <option value="food">Food & Dining</option>
            <option value="transport">Transport</option>
            <option value="education">Education</option>
            <option value="entertainment">Entertainment</option>
            <option value="health">Health</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" />
        </div>
        <button class="btn-primary" id="add-btn">Add Transaction</button>
      </div>

      <div class="card">
        <h2>Spending by Category</h2>
        <canvas id="category-chart" height="220"></canvas>
        <div id="chart-legend" class="chart-legend"></div>
      </div>
    </section>

    <div class="card">
      <div class="transactions-header">
        <h2>Transactions</h2>
        <div class="filter-group">
          <select id="filter-category">
            <option value="all">All categories</option>
            <option value="income">Income</option>
            <option value="housing">Housing</option>
            <option value="food">Food & Dining</option>
            <option value="transport">Transport</option>
            <option value="education">Education</option>
            <option value="entertainment">Entertainment</option>
            <option value="health">Health</option>
            <option value="other">Other</option>
          </select>
          <button class="btn-secondary" id="clear-btn">Clear all</button>
        </div>
      </div>
      <div id="transaction-list" class="transaction-list">
        <p class="empty-state">No transactions yet. Add one above.</p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
